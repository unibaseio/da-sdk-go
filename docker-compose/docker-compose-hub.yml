services:
  dimo-hub:
    image: mossv2/dimo:hub-latest
    ports:
      - 8080:8080
    volumes:
      - ~/data:/data
      - ~/.plonk:/root/.plonk
    restart: on-failure:0
    environment:
      EXPOSE_URL: ""
      MAX_SIZE: "4MB"
      # Authorization freshness window for /api writes (seconds). Browser
      # clients sign one token at login and cache it, so the window must be
      # long enough to cover a session — 7 days here (client refreshes at 6d).
      HUB_AUTH_DRIFT_SEC: "604800"
      # Other tunables (uncomment to override the in-code defaults):
      # HUB_MAX_JSON_BYTES: "4194304"        # /api/upload JSON body cap (4 MiB)
      # HUB_MAX_MULTIPART_BYTES: "67108864"  # /api/uploadData file cap (64 MiB)
      #
      # Per-IP / per-owner token-bucket rate limits (req/s + burst). download is
      # public, so it is gated only by the per-IP bucket; with no batch/stream
      # read API a client syncing N records makes N small GETs, so keep these
      # high. Behind the explorer's reverse proxy all clients share one IP, so
      # the per-IP cap must clear their aggregate. burst = 2x rps absorbs a
      # one-shot batch, then sustains at rps. (Non-existent-key floods are
      # absorbed by the download negative cache, not this limiter.)
      HUB_RATE_IP_RPS: "1000"
      HUB_RATE_IP_BURST: "2000"
      HUB_RATE_OWNER_RPS: "1000"
      HUB_RATE_OWNER_BURST: "2000"
networks:
  default:
    driver: bridge
